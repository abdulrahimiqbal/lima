name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run events, deploy the exact commit that passed CI.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate Railway secrets
        run: |
          test -n "$RAILWAY_TOKEN"
          test -n "$RAILWAY_PROJECT_ID"
          test -n "$RAILWAY_ENVIRONMENT_ID"
          test -n "$RAILWAY_SERVICE_ID"

      - name: Validate Railway context
        run: |
          railway status --json >/tmp/railway-status.json
          cat /tmp/railway-status.json | grep -q "$RAILWAY_PROJECT_ID"
          cat /tmp/railway-status.json | grep -q "$RAILWAY_ENVIRONMENT_ID"
          cat /tmp/railway-status.json | grep -q "$RAILWAY_SERVICE_ID"

      - name: Deploy
        run: |
          railway up --ci \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            --service "$RAILWAY_SERVICE_ID"
